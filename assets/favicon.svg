<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6464ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#050510"/>
  
  <!-- Keyboard keys -->
  <g filter="url(#glow)">
    <!-- Top row -->
    <rect x="15" y="25" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.9"/>
    <rect x="30" y="25" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.9"/>
    <rect x="45" y="25" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.9"/>
    <rect x="60" y="25" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.9"/>
    <rect x="75" y="25" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.9"/>
    
    <!-- Middle row -->
    <rect x="15" y="42" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.8"/>
    <rect x="30" y="42" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.8"/>
    <rect x="45" y="42" width="12" height="12" rx="2" fill="#4ecca3" opacity="1"/>
    <rect x="60" y="42" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.8"/>
    <rect x="75" y="42" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.8"/>
    
    <!-- Bottom row -->
    <rect x="15" y="59" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.7"/>
    <rect x="30" y="59" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.7"/>
    <rect x="45" y="59" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.7"/>
    <rect x="60" y="59" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.7"/>
    <rect x="75" y="59" width="12" height="12" rx="2" fill="url(#grad)" opacity="0.7"/>
    
    <!-- Spacebar -->
    <rect x="25" y="76" width="52" height="10" rx="2" fill="#4ecca3" opacity="0.9"/>
  </g>
</svg>
